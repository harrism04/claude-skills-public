<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{CLIENT_NAME}} — {{PAGE_TITLE}}</title>
<style>
  :root {
    --brand-primary: #003DA5;
    --brand-secondary: #D71920;
    --brand-text-on: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f6f8; min-height: 100vh; display: flex; flex-direction: column; }

  .header {
    background: var(--brand-primary); color: var(--brand-text-on); padding: 16px 24px;
    display: flex; align-items: center; gap: 12px;
  }
  .header .logo { font-size: 20px; font-weight: 800; letter-spacing: 1px; }
  .header .divider { width: 1px; height: 24px; background: rgba(255,255,255,0.3); }
  .header .subtitle { font-size: 13px; opacity: 0.85; }

  .content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }

  .card {
    background: #fff; border-radius: 16px; box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    max-width: 440px; width: 100%; padding: 40px 32px; text-align: center;
  }
  .card .icon {
    width: 56px; height: 56px; border-radius: 50%; background: #e8f0fe;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px; font-size: 24px;
  }
  .card h1 { font-size: 20px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
  .card p { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 24px; }

  .ref-box {
    background: #f8f9fa; border: 1px solid #e8e8e8; border-radius: 8px;
    padding: 12px 16px; margin-bottom: 24px; text-align: left;
  }
  .ref-box .label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
  .ref-box .value { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-top: 2px; }

  .primary-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; padding: 14px; border: none; border-radius: 10px;
    background: var(--brand-primary); color: var(--brand-text-on);
    font-size: 15px; font-weight: 600; cursor: pointer; text-decoration: none;
  }
  .primary-btn:hover { opacity: 0.92; }

  .footer-note { margin-top: 20px; font-size: 11px; color: #aaa; line-height: 1.5; }
  .page-footer { text-align: center; padding: 16px; font-size: 11px; color: #aaa; }
</style>
</head>
<body>

<div class="header">
  <span class="logo">{{CLIENT_SHORT_NAME}}</span>
  <span class="divider"></span>
  <span class="subtitle">{{PAGE_SUBTITLE}}</span>
</div>

<div class="content">
  <div class="card">
    <div class="icon">🔒</div>
    <h1>{{HEADING}}</h1>
    <p>{{BODY_COPY}}</p>

    <div class="ref-box">
      <div class="label">Reference</div>
      <div class="value" id="refNumber">—</div>
    </div>

    <a id="primaryBtn" class="primary-btn" href="#">{{CTA_LABEL}}</a>

    <div class="footer-note">{{LEGAL_NOTE}}</div>
  </div>
</div>

<div class="page-footer">{{COMPANY_LEGAL_NAME}}. All rights reserved.</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const ref = params.get('ref') || '—';
  document.getElementById('refNumber').textContent = ref;

  // Replace href with the live URL this page should redirect to
  document.getElementById('primaryBtn').href = '{{REDIRECT_URL}}';
</script>

</body>
</html>
